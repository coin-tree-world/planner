function App(){
  const SEED={tasks:seedTasks,appointments:seedAppointments,meals:{},recipes:seedRecipes,foods:seedFoods,projects:seedProjects,grocery:[],pantry:seedPantry,calorieGoal:2000};
  const[tab,setTab]=useState("dashboard");
  const[data,setDataRaw]=useState(null);
  const[user,setUser]=useState(undefined);
  const[syncStatus,setSyncStatus]=useState("guest");
  const[showBanner,setShowBanner]=useState(true);
  const[showNudge,setShowNudge]=useState(false);
  const[showAuth,setShowAuth]=useState(false);
  const skipSave=useRef(false);
  const unsubData=useRef(null);
  const nudgeT=useRef(null);

  useEffect(()=>{
    function startAuth(){
      if(!window._fbConfigured){
        setUser(null);setSyncStatus("local");
        const saved=lloadAll();
        setDataRaw(saved?{...SEED,...saved}:{...SEED});
        return;
      }
      const unsub=window._fbOnAuth(u=>{
        setUser(u||null);
        if(unsubData.current){unsubData.current();unsubData.current=null;}
        if(nudgeT.current){clearTimeout(nudgeT.current);nudgeT.current=null;}
        if(u){
          const ref=window._fbDoc("users/"+u.uid+"/planner/data");
          setSyncStatus("connecting");
          const guestData=lloadAll();
          unsubData.current=window._fbOnSnapshot(ref,snap=>{
            skipSave.current=true;
            if(!snap.exists()){
              const init=guestData?{...SEED,...guestData}:{...SEED};
              window._fbSetDoc(ref,init);setDataRaw(init);
              if(guestData)localStorage.removeItem("lp-all");
            } else {
              setDataRaw({...SEED,...snap.data()});
            }
            setSyncStatus("synced");
          },()=>setSyncStatus("error"));
          setShowBanner(false);setShowNudge(false);
        } else {
          const saved=lloadAll();
          setDataRaw(saved?{...SEED,...saved}:{...SEED});
          setSyncStatus("guest");
          nudgeT.current=setTimeout(()=>setShowNudge(true),10*60*1000);
        }
      });
      return unsub;
    }
    let unsub;
    if(window._fbOnAuth){unsub=startAuth();}
    else{
      window.addEventListener("fbReady",function(){unsub=startAuth();},{once:true});
      setTimeout(()=>{if(!window._fbOnAuth){setUser(null);setSyncStatus("local");const saved=lloadAll();setDataRaw(saved?{...SEED,...saved}:{...SEED});}},3000);
    }
    return()=>{if(unsub)unsub();if(unsubData.current)unsubData.current();if(nudgeT.current)clearTimeout(nudgeT.current);};
  },[]);

  const setData=useCallback(updater=>{
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(skipSave.current){skipSave.current=false;return next;}
      if(window._fbConfigured&&user){
        setSyncStatus("saving");
        const ref=window._fbDoc("users/"+user.uid+"/planner/data");
        clearTimeout(window._lpt);
        window._lpt=setTimeout(()=>window._fbSetDoc(ref,next).then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("error")),900);
      } else {
        try{localStorage.setItem("lp-all",JSON.stringify(next));}catch{}
      }
      return next;
    });
  },[user]);

  const mk=f=>v=>setData(d=>{return {...d,[f]:typeof v==="function"?v(d[f]):v};});
  const setTasks=mk("tasks"),setAppointments=mk("appointments"),setMeals=mk("meals");
  const setRecipes=mk("recipes"),setFoods=mk("foods"),setProjects=mk("projects");
  const setGrocery=mk("grocery"),setCalorieGoal=mk("calorieGoal"),setPantry=mk("pantry");

  if(user===undefined||!data)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#F5F0E8",gap:16}}>
      <div style={{fontSize:40}}>🌿</div>
      <div style={{fontFamily:"'Lora',serif",fontSize:20,color:"#7B5C4A"}}>Loading your planner...</div>
    </div>
  );

  const isGuest=window._fbConfigured&&!user;
  const{tasks,appointments,meals,recipes,foods,projects,grocery,pantry,calorieGoal}=data;
  const syncLabel={"synced":"🟢 Synced","saving":"💾 Saving...","guest":"👤 Guest","local":"💻 Local","connecting":"🔄 Connecting","error":"🔴 Offline"}[syncStatus]||"";

  const tabs=[
    {id:"dashboard",label:"Today",icon:"🌅"},
    {id:"tasks",label:"Tasks",icon:"✅"},
    {id:"appointments",label:"Diary",icon:"📅"},
    {id:"meals",label:"Meals",icon:"🍽️"},
    {id:"foods",label:"Foods",icon:"🥘"},
    {id:"recipes",label:"Recipes",icon:"📖"},
    {id:"grocery",label:"Groceries",icon:"🛒"},
    {id:"projects",label:"Projects",icon:"🔨"},
    {id:"pantry",label:"Pantry",icon:"🥫"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#F5F0E8"}}>
      <div style={{background:"#3A2E28",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{fontFamily:"'Lora',serif",fontSize:22,color:"#F5F0E8",fontWeight:600}}>My Life Planner</div>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",marginTop:2}}>{fmtDate(todayStr())}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:syncStatus==="synced"?"#88B04B":syncStatus==="guest"?"#F4C97A":"#B8A898",background:"rgba(255,255,255,0.1)",borderRadius:20,padding:"3px 10px"}}>{syncLabel}</span>
          {user&&<UserAvatar user={user}/>}
          {isGuest&&window._fbConfigured&&<button onClick={()=>{localStorage.setItem("lp-visited","1");setShowAuth(true);}} style={{border:"none",borderRadius:20,padding:"6px 14px",background:"#F4C97A",color:"#3A2E28",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer"}}>Sign in</button>}
          <span style={{fontSize:22}}>🌿</span>
        </div>
      </div>
      {isGuest&&window._fbConfigured&&showBanner&&(
        <div style={{background:"#4A3A20",padding:"9px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#F0DEB0",flex:1}}>You are exploring as a <strong>guest</strong> — data saves on this device only. Sign up free to sync across all devices.</span>
          <button onClick={()=>{localStorage.setItem("lp-visited","1");setShowAuth(true);}} style={{border:"none",borderRadius:8,padding:"5px 14px",background:"#F4C97A",color:"#3A2E28",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer"}}>Sign up free</button>
          <button onClick={()=>setShowBanner(false)} style={{border:"none",background:"none",color:"#B8A898",fontSize:16,cursor:"pointer",lineHeight:1}}>x</button>
        </div>
      )}
      {showNudge&&isGuest&&<NudgeModal onSignUp={()=>{setShowAuth(true);setShowNudge(false);}} onDismiss={()=>setShowNudge(false)}/>}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} startMode={localStorage.getItem("lp-visited")?"signin":"signup"}/>}
      <div style={{background:"#2E2420",display:"flex",overflowX:"auto",padding:"0 8px"}}>
        {tabs.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)} style={{
            padding:"12px 14px",color:tab===t.id?"#F4C97A":"#B8A898",
            borderBottom:tab===t.id?"2px solid #F4C97A":"2px solid transparent",
            fontSize:13,fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,whiteSpace:"nowrap",letterSpacing:"0.02em",
          }}><span style={{marginRight:5}}>{t.icon}</span>{t.label}</button>
        ))}
      </div>
      <div style={{padding:"20px 16px",maxWidth:900,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard tasks={tasks} appointments={appointments} meals={meals} setTasks={setTasks} projects={projects} setTab={setTab} recipes={recipes} foods={foods} calorieGoal={calorieGoal}/>}
        {tab==="tasks"&&<Tasks tasks={tasks} setTasks={setTasks}/>}
        {tab==="appointments"&&<Appointments appointments={appointments} setAppointments={setAppointments}/>}
        {tab==="meals"&&<MealPlanner meals={meals} setMeals={setMeals} recipes={recipes} foods={foods} calorieGoal={calorieGoal} setCalorieGoal={setCalorieGoal}/>}
        {tab==="foods"&&<FoodDatabase foods={foods} setFoods={setFoods}/>}
        {tab==="recipes"&&<Recipes recipes={recipes} setRecipes={setRecipes}/>}
        {tab==="grocery"&&<GroceryList grocery={grocery} setGrocery={setGrocery} recipes={recipes} meals={meals}/>}
        {tab==="projects"&&<Projects projects={projects} setProjects={setProjects}/>}
        {tab==="pantry"&&<Pantry pantry={pantry} setPantry={setPantry} setTab={setTab} setGrocery={setGrocery} grocery={grocery}/>}
      </div>
    </div>
  );
}

// ── Dashboard ───────────────────────────────────────────────────────────────
function Dashboard({tasks,appointments,meals,setTasks,projects,setTab,recipes,foods,calorieGoal}){
  const ts=todayStr();
  const todayDay=DAYS[new Date().getDay()];
  const todayMeals=meals[ts]||{};
  const getCal=n=>{if(!n)return null;const nm=n.toLowerCase();const r=recipes.find(r=>r.name.toLowerCase()===nm);if(r?.calories)return r.calories;const f=foods.find(f=>f.name.toLowerCase()===nm);return f?.calories??null};
  const todayCals=["breakfast","lunch","dinner"].reduce((s,sl)=>s+(getCal(todayMeals[sl])||0),0);
  const hasAnyCals=["breakfast","lunch","dinner"].some(s=>getCal(todayMeals[s])!==null);
  const todayTasks=tasks.filter(t=>t.recurrence==="daily"||(t.recurrence==="weekly"&&t.day===todayDay));
  const upcomingAppts=appointments.filter(a=>daysUntil(a.date)>=0&&daysUntil(a.date)<=14).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
  const activeProjects=projects.filter(p=>p.status!=="completed").slice(0,3);
  return(
    <div>
      <h2 style={{fontFamily:"'Lora',serif",fontSize:26,marginBottom:6}}>Good day 🌞</h2>
      <p style={{fontFamily:"'Source Sans 3',sans-serif",color:"#8A7A6A",marginBottom:20,fontSize:15}}>Here's your day at a glance.</p>

      {/* Meals */}
      <div className="card" style={{padding:"16px 20px",marginBottom:16,background:"linear-gradient(135deg,#FFF8EE,#FDF0DC)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8926A",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Today's Meals</div>
          {hasAnyCals&&<div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#7B5C4A",fontWeight:700}}>🔥 {todayCals} <span style={{color:"#B8A898",fontWeight:400}}>/ {calorieGoal} kcal</span></div>}
        </div>
        {hasAnyCals&&<div style={{marginBottom:12}}>
          <div style={{background:"#EDE8E2",borderRadius:8,height:8,overflow:"hidden"}}>
            <div style={{height:8,borderRadius:8,transition:"width 0.4s",background:todayCals>calorieGoal?"#D4524A":todayCals>calorieGoal*.85?"#C9874F":"#88B04B",width:`${Math.min(100,Math.round(todayCals/calorieGoal*100))}%`}}/>
          </div>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#B8A898",marginTop:3,textAlign:"right"}}>{Math.round(todayCals/calorieGoal*100)}% of daily goal</div>
        </div>}
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {["breakfast","lunch","dinner"].map(m=>{const cal=getCal(todayMeals[m]);return(
            <div key={m} style={{flex:1,minWidth:110,background:"#fff",borderRadius:10,padding:"10px 14px",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:18}}>{CAT_ICONS[m]}</div>
              <div style={{fontSize:11,color:"#B8A898",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{m}</div>
              <div style={{fontSize:14,fontFamily:"'Lora',serif",marginTop:3,color:todayMeals[m]?"#3A2E28":"#C4B8AC"}}>{todayMeals[m]||"Not planned"}</div>
              {cal!==null&&<div style={{fontSize:11,color:"#C9874F",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,marginTop:3}}>🔥 {cal} kcal</div>}
            </div>
          )})}
        </div>
        <button className="btn btn-ghost" onClick={()=>setTab("meals")} style={{marginTop:12,fontSize:12,padding:"5px 12px"}}>Plan meals →</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        {/* Tasks */}
        <div className="card" style={{padding:"16px 20px"}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#7B9EBF",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>
            Today's Tasks <span style={{background:"#EDF3F9",color:"#5A80A0",borderRadius:10,padding:"1px 8px",fontSize:11}}>{todayTasks.length}</span>
          </div>
          {todayTasks.length===0&&<p style={{fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:14}}>Nothing scheduled 🎉</p>}
          {todayTasks.slice(0,5).map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,opacity:t.done?.45:1}}>
              <input type="checkbox" checked={t.done} onChange={()=>setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:!x.done}:x))} style={{width:16,height:16,cursor:"pointer",accentColor:"#7B5C4A"}}/>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,textDecoration:t.done?"line-through":"none",color:t.done?"#B8A898":"#3A2E28"}}>{CAT_ICONS[t.category]||"📌"} {t.title}</span>
            </div>
          ))}
          <button className="btn btn-ghost" onClick={()=>setTab("tasks")} style={{marginTop:8,fontSize:12,padding:"5px 12px"}}>All tasks →</button>
        </div>
        {/* Appointments */}
        <div className="card" style={{padding:"16px 20px"}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#E07B7B",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Upcoming</div>
          {upcomingAppts.length===0&&<p style={{fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:14}}>Nothing coming up</p>}
          {upcomingAppts.map(a=>{const d=daysUntil(a.date);return(
            <div key={a.id} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid #F0EAE4"}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:14}}>{a.title}</div>
              <div style={{fontSize:12,color:d===0?"#D4524A":d<=3?"#C9874F":"#8A7A6A",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>
                {d===0?"Today":d===1?"Tomorrow":`In ${d} days`} · {a.time}
              </div>
            </div>
          )})}
          <button className="btn btn-ghost" onClick={()=>setTab("appointments")} style={{marginTop:4,fontSize:12,padding:"5px 12px"}}>Full diary →</button>
        </div>
      </div>

      {/* Projects */}
      <div className="card" style={{padding:"16px 20px"}}>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#88B04B",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Active Projects</div>
        {activeProjects.length===0&&<p style={{fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:14}}>No active projects</p>}
        <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
          {activeProjects.map(p=>{const done=p.steps.filter(s=>s.done).length;const pct=p.steps.length?Math.round(done/p.steps.length*100):0;return(
            <div key={p.id} style={{flex:1,minWidth:150,background:"#F9F6F2",borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontFamily:"'Lora',serif",fontSize:14,fontWeight:600,marginBottom:4}}>{CAT_ICONS[p.category]||"🔨"} {p.title}</div>
              <div style={{background:"#E8E0D8",borderRadius:6,height:6,marginBottom:4}}><div style={{background:"#88B04B",width:`${pct}%`,height:6,borderRadius:6}}/></div>
              <div style={{fontSize:12,fontFamily:"'Source Sans 3',sans-serif",color:"#8A7A6A"}}>{pct}% · {done}/{p.steps.length} steps</div>
            </div>
          )})}
        </div>
        <button className="btn btn-ghost" onClick={()=>setTab("projects")} style={{marginTop:12,fontSize:12,padding:"5px 12px"}}>All projects →</button>
      </div>
    </div>
  );
}

// ── Tasks ───────────────────────────────────────────────────────────────────
function Tasks({tasks,setTasks}){
  const[showModal,setShowModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[filter,setFilter]=useState("all");
  const[form,setForm]=useState({title:"",category:"cleaning",recurrence:"weekly",day:"Monday",priority:"medium",done:false});
  const openNew=()=>{setEditing(null);setForm({title:"",category:"cleaning",recurrence:"weekly",day:"Monday",priority:"medium",done:false});setShowModal(true)};
  const openEdit=t=>{setEditing(t.id);setForm({...t});setShowModal(true)};
  const save=()=>{if(!form.title.trim())return;if(editing)setTasks(ts=>ts.map(t=>t.id===editing?{...form,id:editing}:t));else setTasks(ts=>[...ts,{...form,id:Date.now(),done:false}]);setShowModal(false)};
  const del=id=>setTasks(ts=>ts.filter(t=>t.id!==id));
  const toggle=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const filtered=filter==="all"?tasks:tasks.filter(t=>t.category===filter);
  const cats=[...new Set(tasks.map(t=>t.category))];
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Tasks & Chores</h2>
        <button className="btn btn-primary" onClick={openNew}>+ Add Task</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {["all",...cats].map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Source Sans 3',sans-serif",textTransform:"capitalize",background:filter===c?"#7B5C4A":"#EDE8E2",color:filter===c?"white":"#7A6A5A",transition:"all 0.18s"}}>
            {CAT_ICONS[c]||"📌"} {c}
          </button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(t=>(
          <div key={t.id} className="card" style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,opacity:t.done?.55:1}}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)} style={{width:18,height:18,cursor:"pointer",accentColor:"#7B5C4A",flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:15,textDecoration:t.done?"line-through":"none"}}>{CAT_ICONS[t.category]||"📌"} {t.title}</div>
              <div style={{fontSize:12,color:"#8A7A6A",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>
                {t.recurrence==="weekly"?`Every ${t.day}`:t.recurrence==="daily"?"Daily":t.recurrence} · <span style={{color:t.priority==="high"?"#D4524A":t.priority==="low"?"#88B04B":"#C9874F",fontWeight:700}}>{t.priority} priority</span>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button className="btn btn-ghost" onClick={()=>openEdit(t)} style={{fontSize:12,padding:"4px 10px"}}>Edit</button>
              <button className="btn btn-danger" onClick={()=>del(t.id)} style={{fontSize:12,padding:"4px 10px"}}>✕</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div style={{fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",textAlign:"center",padding:"40px 0",fontSize:15}}>No tasks. Click + Add Task to start.</div>}
      </div>
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:20}}>{editing?"Edit":"New"} Task</h3>
            <div className="form-row"><label>Task title</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={{width:"100%"}} placeholder="e.g. Mop kitchen floor"/></div>
            <div className="form-row"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{TASK_CATS.map(c=><option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}</select></div>
            <div className="form-row"><label>Recurrence</label><select value={form.recurrence} onChange={e=>setForm(f=>({...f,recurrence:e.target.value}))} style={{width:"100%"}}>
              <option value="once">Once / As needed</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="fortnightly">Fortnightly</option><option value="monthly">Monthly</option>
            </select></div>
            {form.recurrence==="weekly"&&<div className="form-row"><label>Day of week</label><select value={form.day} onChange={e=>setForm(f=>({...f,day:e.target.value}))} style={{width:"100%"}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></div>}
            <div className="form-row"><label>Priority</label><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={{width:"100%"}}><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Appointments ────────────────────────────────────────────────────────────
function Appointments({appointments,setAppointments}){
  const[showModal,setShowModal]=useState(false);
  const[editing,setEditing]=useState(null);

  const sorted=[...appointments].sort((a,b)=>a.date.localeCompare(b.date));

  const Card=({a})=>{const d=daysUntil(a.date);return(
    <div className="card" style={{padding:"14px 16px",display:"flex",gap:14,marginBottom:8}}>

        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#8A7A6A",fontWeight:700}}>{a.date.slice(5,7)}/{a.date.slice(8,10)}</div>
        <div style={{fontSize:20}}>{CAT_ICONS[a.category]||"📅"}</div>
      </div>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:15}}>{a.title}</div>
        <div style={{fontSize:12,color:d===0?"#D4524A":d===1?"#C9874F":"#8A7A6A",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>
          {d===0?"Today":d===1?"Tomorrow":d<0?`${Math.abs(d)} days ago`:`In ${d} days`} at {a.time}
        </div>
        {a.notes&&<div style={{fontSize:13,color:"#8A7A6A",fontFamily:"'Source Sans 3',sans-serif",marginTop:4,fontStyle:"italic"}}>{a.notes}</div>}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
        <button className="btn btn-ghost" onClick={()=>openEdit(a)} style={{fontSize:12,padding:"4px 10px"}}>Edit</button>
        <button className="btn btn-danger" onClick={()=>del(a.id)} style={{fontSize:12,padding:"4px 10px"}}>✕</button>
      </div>
    </div>
  )};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

      {past.length>0&&<><h3 style={{fontFamily:"'Lora',serif",fontSize:16,color:"#B8A898",margin:"20px 0 10px"}}>Past</h3>{past.slice(-3).reverse().map(a=><Card key={a.id} a={a}/>)}</>}

            <div className="form-row"><label>Title</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={{width:"100%"}} placeholder="e.g. Doctor's appointment"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div className="form-row"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:"100%"}}/></div>
              <div className="form-row"><label>Time</label><input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} style={{width:"100%"}}/></div>
            </div>
            <div className="form-row"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{APPT_CATS.map(c=><option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}</select></div>
            <div className="form-row"><label>Notes</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{width:"100%",minHeight:70}}/></div>

  );
}

// ── Meal Planner ─────────────────────────────────────────────────────────────
function MealPlanner({meals,setMeals,recipes,foods,calorieGoal,setCalorieGoal}){
  const[weekStart,setWeekStart]=useState(()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d});
  const[editing,setEditing]=useState(null);
  const[mealText,setMealText]=useState("");
  const[showGoalEdit,setShowGoalEdit]=useState(false);
  const[goalDraft,setGoalDraft]=useState(calorieGoal);
  const ts=todayStr();
  const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)});
  const prevWeek=()=>{const d=new Date(weekStart);d.setDate(d.getDate()-7);setWeekStart(d)};
  const nextWeek=()=>{const d=new Date(weekStart);d.setDate(d.getDate()+7);setWeekStart(d)};
  const setMeal=(date,slot,val)=>setMeals(m=>({...m,[date]:{...(m[date]||{}),[slot]:val}}));
  const getCal=n=>{if(!n)return null;const nm=n.toLowerCase();const r=recipes.find(r=>r.name.toLowerCase()===nm);if(r?.calories)return r.calories;const f=foods.find(f=>f.name.toLowerCase()===nm);return f?.calories??null};
  const getSugg=(slot,text)=>{const t=text.toLowerCase();const rs=recipes.filter(r=>r.category===slot&&r.name.toLowerCase().includes(t)).map(r=>({name:r.name,calories:r.calories,type:"recipe"}));const fs=foods.filter(f=>f.category===slot&&f.name.toLowerCase().includes(t)).map(f=>({name:f.name,calories:f.calories,type:"food"}));const of=foods.filter(f=>f.category!==slot&&f.name.toLowerCase().includes(t)&&t.length>=2).map(f=>({name:f.name,calories:f.calories,type:"food"}));return[...rs,...fs,...of].slice(0,8)};
  const dailyTotals=weekDates.map(d=>{const dm=meals[d]||{};let tot=0;let has=false;["breakfast","lunch","dinner"].forEach(sl=>{const c=getCal(dm[sl]);if(c!==null){tot+=c;has=true}});return has?tot:null});
  const maxTot=Math.max(calorieGoal,...dailyTotals.filter(Boolean));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Meal Planner</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn btn-ghost" onClick={prevWeek} style={{padding:"6px 12px"}}>← Prev</button>
          <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",fontWeight:600}}>{weekDates[0].slice(8)}/{weekDates[0].slice(5,7)} – {weekDates[6].slice(8)}/{weekDates[6].slice(5,7)}</span>
          <button className="btn btn-ghost" onClick={nextWeek} style={{padding:"6px 12px"}}>Next →</button>
        </div>
      </div>

      {/* Goal */}
      <div className="card" style={{padding:"14px 18px",marginBottom:16,background:"linear-gradient(135deg,#FFF8EE,#FDF0DC)",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div style={{fontSize:24}}>🎯</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8926A",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>Daily Calorie Goal</div>
          {showGoalEdit?(
            <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}>
              <input type="number" value={goalDraft} onChange={e=>setGoalDraft(+e.target.value)} style={{width:100,fontSize:15,padding:"4px 8px"}} min={500} max={5000} step={50}/>
              <button className="btn btn-primary" style={{padding:"4px 12px",fontSize:13}} onClick={()=>{setCalorieGoal(goalDraft);setShowGoalEdit(false)}}>Save</button>
              <button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:13}} onClick={()=>setShowGoalEdit(false)}>Cancel</button>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginTop:2}}>
              <span style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:600,color:"#7B5C4A"}}>{calorieGoal.toLocaleString()}</span>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A"}}>kcal / day</span>
              <button onClick={()=>{setGoalDraft(calorieGoal);setShowGoalEdit(true)}} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:"#B8A898",textDecoration:"underline",fontFamily:"'Source Sans 3',sans-serif"}}>change</button>
            </div>
          )}
        </div>
      </div>

      {/* Weekly chart */}
      {dailyTotals.some(t=>t!==null)&&(
        <div className="card" style={{padding:"16px 18px",marginBottom:16}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>🔥 Weekly Calories</div>
          <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
            {weekDates.map((d,i)=>{const tot=dailyTotals[i];const pct=tot!==null?Math.min(100,Math.round(tot/maxTot*100)):0;const over=tot>calorieGoal;const isT=d===ts;return(
              <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                {tot!==null&&<div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:over?"#D4524A":"#8A7A6A",fontWeight:700}}>{tot>=1000?`${(tot/1000).toFixed(1)}k`:tot}</div>}
                <div style={{width:"100%",display:"flex",alignItems:"flex-end",height:54,position:"relative"}}>
                  <div style={{position:"absolute",bottom:`${Math.round(calorieGoal/maxTot*54)}px`,left:0,right:0,borderTop:"1.5px dashed #C9874F"}}/>
                  <div style={{width:"100%",borderRadius:"4px 4px 0 0",height:tot!==null?`${pct}%`:4,background:tot===null?"#F0EAE4":over?"#D4524A":isT?"#7B5C4A":"#88B04B",minHeight:4}}/>
                </div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:isT?"#7B5C4A":"#B8A898",fontWeight:isT?700:400}}>{DAYS[new Date(d+"T12:00:00").getDay()].slice(0,3)}</div>
              </div>
            )})}
          </div>
        </div>
      )}

      {/* Grid */}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"6px 6px"}}>
          <thead><tr>
            <th style={{padding:"8px 12px",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",textAlign:"left",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",width:70}}>Meal</th>
            {weekDates.map(d=>(
              <th key={d} style={{padding:"6px 8px",textAlign:"center",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:d===ts?"#7B5C4A":"#8A7A6A",background:d===ts?"#FFF3E8":"transparent",borderRadius:8}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>{DAYS[new Date(d+"T12:00:00").getDay()].slice(0,3)}</div>
                <div style={{fontSize:15}}>{d.slice(8)}</div>
              </th>
            ))}
          </tr></thead>
          <tbody>
            {["breakfast","lunch","dinner"].map(slot=>(
              <tr key={slot}>
                <td style={{padding:"8px 8px",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:"#8A7A6A",textTransform:"capitalize",verticalAlign:"top"}}>{CAT_ICONS[slot]}<br/><span style={{fontSize:10}}>{slot}</span></td>
                {weekDates.map(d=>{const val=(meals[d]||{})[slot]||"";const cal=getCal(val);return(
                  <td key={d} onClick={()=>{setEditing({date:d,slot});setMealText(val)}} style={{background:"#fff",borderRadius:8,padding:"8px",verticalAlign:"top",cursor:"pointer",minWidth:85,border:editing?.date===d&&editing?.slot===slot?"2px solid #7B5C4A":"2px solid transparent",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                    {editing?.date===d&&editing?.slot===slot?(
                      <div onClick={e=>e.stopPropagation()}>
                        <input value={mealText} onChange={e=>setMealText(e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px"}} onKeyDown={e=>{if(e.key==="Enter"){setMeal(d,slot,mealText);setEditing(null)}if(e.key==="Escape")setEditing(null)}} autoFocus/>
                        <div style={{marginTop:4,maxHeight:120,overflowY:"auto"}}>
                          {getSugg(slot,mealText).map((s,i)=>(
                            <div key={i} onClick={()=>{setMeal(d,slot,s.name);setEditing(null)}} style={{fontSize:11,padding:"4px 6px",cursor:"pointer",background:"#F5F0E8",borderRadius:4,marginBottom:2,fontFamily:"'Source Sans 3',sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <span>{s.type==="recipe"?"📖":"🥘"} {s.name}</span>
                              {s.calories&&<span style={{color:"#C9874F",fontWeight:700,marginLeft:6}}>🔥{s.calories}</span>}
                            </div>
                          ))}
                        </div>
                        <button className="btn btn-primary" onClick={()=>{setMeal(d,slot,mealText);setEditing(null)}} style={{fontSize:11,padding:"3px 10px",marginTop:4}}>✓</button>
                      </div>
                    ):(
                      <div>
                        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:val?"#3A2E28":"#D4C9BC"}}>{val||"+ Add"}</div>
                        {cal!==null&&<div style={{fontSize:10,color:"#C9874F",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,marginTop:2}}>🔥 {cal} kcal</div>}
                      </div>
                    )}
                  </td>
                )})}
              </tr>
            ))}
            <tr>
              <td style={{padding:"8px",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontWeight:700,color:"#B8A898",textTransform:"uppercase"}}>Total</td>
              {weekDates.map((d,i)=>{const tot=dailyTotals[i];const over=tot>calorieGoal;return(
                <td key={d} style={{padding:"8px",textAlign:"center"}}>
                  {tot!==null?(
                    <div>
                      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,fontWeight:700,color:over?"#D4524A":"#3A2E28"}}>{tot}</div>
                      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"#B8A898"}}>kcal</div>
                      <div style={{background:"#EDE8E2",borderRadius:4,height:4,marginTop:3,overflow:"hidden"}}><div style={{height:4,borderRadius:4,background:over?"#D4524A":"#88B04B",width:`${Math.min(100,Math.round(tot/calorieGoal*100))}%`}}/></div>
                    </div>
                  ):<span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#D4C9BC"}}>—</span>}
                </td>
              )})}
            </tr>
          </tbody>
        </table>
      </div>
      <p style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",marginTop:12}}>💡 Click any cell to edit. Calories show automatically for items in your Foods & Recipes.</p>
    </div>
  );
}

// ── Food Database ─────────────────────────────────────────────────────────────
function FoodDatabase({foods,setFoods}){

        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:150}}>

        <div key={cat} style={{marginBottom:20}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:"#B8A898",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            <span>{CAT_ICONS[cat]||"🍴"}</span>{cat}<span style={{background:"#EDE8E2",color:"#8A7A6A",borderRadius:10,padding:"1px 8px",fontSize:11}}>{cf.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {cf.map(f=>(
              <div key={f.id} className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:15}}>{f.name}</div>
                  {f.notes&&<div style={{fontSize:12,color:"#B8A898",fontFamily:"'Source Sans 3',sans-serif",marginTop:1,fontStyle:"italic"}}>{f.notes}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {f.calories?<div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,color:"#C9874F"}}>🔥 {f.calories} <span style={{fontSize:11,fontWeight:400,color:"#B8A898"}}>kcal</span></div>:<div style={{fontSize:12,color:"#D4C9BC",fontFamily:"'Source Sans 3',sans-serif"}}>no cals</div>}
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button className="btn btn-ghost" onClick={()=>openEdit(f)} style={{fontSize:12,padding:"4px 10px"}}>Edit</button>
                  <button className="btn btn-danger" onClick={()=>del(f.id)} style={{fontSize:12,padding:"4px 10px"}}>✕</button>

      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div className="form-row"><label>Meal type</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{FOOD_CATS.map(c=><option key={c} value={c}>{CAT_ICONS[c]||"🍴"} {c}</option>)}</select></div>
              <div className="form-row"><label>Calories (kcal)</label><input type="number" min="0" value={form.calories} onChange={e=>setForm(f=>({...f,calories:e.target.value}))} placeholder="e.g. 350" style={{width:"100%"}}/></div>
