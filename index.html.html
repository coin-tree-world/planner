            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveFd}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Recipes ───────────────────────────────────────────────────────────────────
function Recipes({recipes,setRecipes}){
  const[showModal,setShowModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[viewing,setViewing]=useState(null);
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("all");
  const[form,setForm]=useState({name:"",category:"dinner",servings:4,time:"",calories:"",ingredients:"",method:"",tags:""});
  const openNew=()=>{setEditing(null);setForm({name:"",category:"dinner",servings:4,time:"",calories:"",ingredients:"",method:"",tags:""});setShowModal(true)};
  const openEdit=r=>{setEditing(r.id);setForm({...r,calories:r.calories||"",tags:Array.isArray(r.tags)?r.tags.join(", "):r.tags||""});setShowModal(true)};
  const save=()=>{if(!form.name.trim())return;const rec={...form,calories:form.calories?+form.calories:null,tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean)};if(editing)setRecipes(rs=>rs.map(r=>r.id===editing?{...rec,id:editing}:r));else setRecipes(rs=>[...rs,{...rec,id:Date.now()}]);setShowModal(false)};
  const del=id=>{setRecipes(rs=>rs.filter(r=>r.id!==id));if(viewing?.id===id)setViewing(null)};
  const filtered=recipes.filter(r=>(filterCat==="all"||r.category===filterCat)&&(r.name.toLowerCase().includes(search.toLowerCase())||(r.tags||[]).some(t=>t.toLowerCase().includes(search.toLowerCase()))));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Recipe Book</h2>
        <button className="btn btn-primary" onClick={openNew}>+ Add Recipe</button>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search recipes…" style={{flex:1,minWidth:160}}/>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:140}}>
          <option value="all">All meals</option>
          {RECIPE_CATS.map(c=><option key={c} value={c}>{CAT_ICONS[c]||"🍴"} {c}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
        {filtered.map(r=>(
          <div key={r.id} className="card" style={{padding:16,cursor:"pointer",transition:"transform .15s,box-shadow .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,.1)"}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow=""}}
            onClick={()=>setViewing(r)}>
            <div style={{fontSize:32,marginBottom:8,textAlign:"center"}}>{CAT_ICONS[r.category]||"🍴"}</div>
            <div style={{fontFamily:"'Lora',serif",fontSize:16,fontWeight:600,textAlign:"center",marginBottom:6}}>{r.name}</div>
            <div style={{textAlign:"center",fontSize:12,color:"#8A7A6A",fontFamily:"'Source Sans 3',sans-serif",marginBottom:8}}>{r.servings} serves · {r.time}{r.calories?` · 🔥 ${r.calories} kcal`:""}</div>
            <div style={{textAlign:"center"}}>{(r.tags||[]).map(t=><span key={t} className="tag" style={{background:"#F5F0E8",color:"#7A6A5A"}}>{t}</span>)}</div>
          </div>
        ))}
        {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"40px 0",fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:15}}>No recipes found.</div>}
      </div>
      {viewing&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setViewing(null)}>
          <div className="modal" style={{maxWidth:600}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontSize:36}}>{CAT_ICONS[viewing.category]||"🍴"}</div>
                <h3 style={{fontFamily:"'Lora',serif",fontSize:24,marginTop:4}}>{viewing.name}</h3>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",marginTop:2}}>
                  {viewing.servings} servings · {viewing.time}{viewing.calories&&<span style={{color:"#C9874F",fontWeight:700,marginLeft:8}}>🔥 {viewing.calories} kcal per serving</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost" onClick={()=>{openEdit(viewing);setViewing(null)}} style={{fontSize:12,padding:"5px 12px"}}>Edit</button>
                <button className="btn btn-danger" onClick={()=>del(viewing.id)} style={{fontSize:12,padding:"5px 12px"}}>Delete</button>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Ingredients</div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,color:"#3A2E28",background:"#F9F6F2",borderRadius:8,padding:"12px 14px",whiteSpace:"pre-line"}}>{viewing.ingredients}</div>
            </div>
            <div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Method</div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,color:"#3A2E28",lineHeight:1.6}}>{viewing.method}</div>
            </div>
            <button className="btn btn-ghost" onClick={()=>setViewing(null)} style={{marginTop:20}}>Close</button>
          </div>
        </div>
      )}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:20}}>{editing?"Edit":"New"} Recipe</h3>
            <div className="form-row"><label>Recipe name</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{width:"100%"}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
              <div className="form-row"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{RECIPE_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div className="form-row"><label>Servings</label><input type="number" min="1" value={form.servings} onChange={e=>setForm(f=>({...f,servings:+e.target.value}))} style={{width:"100%"}}/></div>
              <div className="form-row"><label>Time</label><input value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} placeholder="45 min" style={{width:"100%"}}/></div>
              <div className="form-row"><label>Cals/serve</label><input type="number" min="0" value={form.calories} onChange={e=>setForm(f=>({...f,calories:e.target.value}))} placeholder="450" style={{width:"100%"}}/></div>
            </div>
            <div className="form-row"><label>Ingredients</label><textarea value={form.ingredients} onChange={e=>setForm(f=>({...f,ingredients:e.target.value}))} style={{width:"100%",minHeight:80}} placeholder="One per line or comma-separated"/></div>
            <div className="form-row"><label>Method</label><textarea value={form.method} onChange={e=>setForm(f=>({...f,method:e.target.value}))} style={{width:"100%",minHeight:100}}/></div>
            <div className="form-row"><label>Tags (comma separated)</label><input value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} placeholder="easy, winter, healthy" style={{width:"100%"}}/></div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Grocery List ──────────────────────────────────────────────────────────────
function GroceryList({grocery,setGrocery,recipes,meals}){
  const[showModal,setShowModal]=useState(false);
  const[showRecipePicker,setShowRecipePicker]=useState(false);
  const[filter,setFilter]=useState("all"); // all | pending | done
  const[form,setForm]=useState({name:"",qty:"",unit:"",category:"Produce",notes:""});
  const[quickText,setQuickText]=useState("");
  const[search,setSearch]=useState("");

  // Add a single item
  const addItem=item=>{setGrocery(g=>[...g,{id:Date.now()+Math.random(),done:false,...item}])};

  // Quick-add from the inline bar
  const quickAdd=()=>{
    if(!quickText.trim())return;
    addItem({name:quickText.trim(),qty:"",unit:"",category:"Other",notes:""});
    setQuickText("");
  };

  // Add from modal form
  const saveItem=()=>{
    if(!form.name.trim())return;
    addItem({...form});
    setForm({name:"",qty:"",unit:"",category:"Produce",notes:""});
    setShowModal(false);
  };

  const toggle=id=>setGrocery(g=>g.map(i=>i.id===id?{...i,done:!i.done}:i));
  const del=id=>setGrocery(g=>g.filter(i=>i.id!==id));
  const clearDone=()=>setGrocery(g=>g.filter(i=>!i.done));
  const clearAll=()=>{if(window.confirm("Clear entire list?"))setGrocery([])};

  // Pull ingredients from a recipe and add as separate items
  const addFromRecipe=recipe=>{
    const raw=recipe.ingredients||"";
    // Split on commas or newlines
    const parts=raw.split(/,|\n/).map(s=>s.trim()).filter(Boolean);
    const newItems=parts.map(p=>({
      id:Date.now()+Math.random(),
      name:p,qty:"",unit:"",
      category:"Pantry",
      notes:`From: ${recipe.name}`,
      done:false,
    }));
    setGrocery(g=>[...g,...newItems]);
    setShowRecipePicker(false);
  };

  // Pull ingredients from ALL recipes planned this week
  const addFromWeekMeals=()=>{
    const today=new Date();today.setHours(0,0,0,0);
    const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-d.getDay()+i);return d.toISOString().slice(0,10)});
    const mealNames=new Set();
    weekDates.forEach(date=>{
      const dm=meals[date]||{};
      ["breakfast","lunch","dinner"].forEach(slot=>{if(dm[slot])mealNames.add(dm[slot].toLowerCase())});
    });
    const matchedRecipes=recipes.filter(r=>mealNames.has(r.name.toLowerCase()));
    if(matchedRecipes.length===0){alert("No recipes found for this week's meal plan. Add meals to the planner first.");return}
    matchedRecipes.forEach(r=>{
      const parts=(r.ingredients||"").split(/,|\n/).map(s=>s.trim()).filter(Boolean);
      parts.forEach(p=>addItem({name:p,qty:"",unit:"",category:"Pantry",notes:`From: ${r.name}`,done:false}));
    });
    setShowRecipePicker(false);
  };

  const pending=grocery.filter(i=>!i.done);
  const done=grocery.filter(i=>i.done);
  const displayed=filter==="pending"?pending:filter==="done"?done:grocery;
  const searched=search?displayed.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())):displayed;

  // Group by category
  const catOrder=GROCERY_CATS;
  const groups=catOrder.reduce((acc,cat)=>{const items=searched.filter(i=>i.category===cat);if(items.length)acc.push({cat,items});return acc},[]);
  const uncatItems=searched.filter(i=>!GROCERY_CATS.includes(i.category));
  if(uncatItems.length)groups.push({cat:"Other",items:uncatItems});


  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Grocery List</h2>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",marginTop:2}}>
            {pending.length} item{pending.length!==1?"s":""} remaining · {done.length} ticked off
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" onClick={()=>setShowRecipePicker(true)} style={{fontSize:13}}>📖 From Recipes</button>
          <button className="btn btn-primary" onClick={()=>setShowModal(true)} style={{fontSize:13}}>+ Add Item</button>
        </div>
      </div>

      {/* Quick-add bar */}
      <div className="card" style={{padding:"12px 16px",marginBottom:14,display:"flex",gap:8}}>
        <input value={quickText} onChange={e=>setQuickText(e.target.value)} placeholder="Quick add — type item and press Enter…"
          style={{flex:1}} onKeyDown={e=>{if(e.key==="Enter")quickAdd()}}/>
        <button className="btn btn-primary" onClick={quickAdd} style={{flexShrink:0,padding:"8px 16px"}}>Add</button>
      </div>

      {/* Filters & search */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {["all","pending","done"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:700,
            fontFamily:"'Source Sans 3',sans-serif",textTransform:"capitalize",
            background:filter===f?"#7B5C4A":"#EDE8E2",color:filter===f?"white":"#7A6A5A",transition:"all 0.18s"
          }}>{f==="all"?"All":f==="pending"?`Remaining (${pending.length})`:`Ticked off (${done.length})`}</button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" style={{marginLeft:"auto",width:160,fontSize:13,padding:"6px 10px"}}/>
      </div>

      {/* List grouped by aisle */}
      {groups.length===0&&(
        <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:15}}>
          <div style={{fontSize:48,marginBottom:12}}>🛒</div>
          {grocery.length===0?"Your list is empty. Use Quick Add or + Add Item to start.":"Nothing matches your filter."}
        </div>
      )}
      {groups.map(({cat,items})=>(
        <div key={cat} style={{marginBottom:20}}>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:"#B8A898",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{AISLE_ICONS[cat]||"📦"}</span>{cat}
            <span style={{background:"#EDE8E2",color:"#8A7A6A",borderRadius:10,padding:"1px 8px",fontSize:11}}>{items.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {items.map(item=>(
              <div key={item.id} className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:item.done?0.5:1,transition:"opacity 0.2s"}}>
                <input type="checkbox" checked={item.done} onChange={()=>toggle(item.id)}
                  style={{width:20,height:20,cursor:"pointer",accentColor:"#7B5C4A",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:15,textDecoration:item.done?"line-through":"none",color:item.done?"#B8A898":"#3A2E28"}}>
                    {item.qty&&<span style={{color:"#C9874F",marginRight:6,fontWeight:700}}>{item.qty}{item.unit&&" "+item.unit}</span>}
                    {item.name}
                  </div>
                  {item.notes&&<div style={{fontSize:12,color:"#B8A898",fontFamily:"'Source Sans 3',sans-serif",marginTop:1,fontStyle:"italic"}}>{item.notes}</div>}
                </div>
                <button onClick={()=>del(item.id)} style={{border:"none",background:"none",cursor:"pointer",fontSize:18,color:"#D4C9BC",padding:"0 4px",lineHeight:1}} title="Remove">✕</button>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Bottom actions */}
      {grocery.length>0&&(
        <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
          {done.length>0&&<button className="btn btn-ghost" onClick={clearDone} style={{fontSize:13}}>🗑 Clear ticked ({done.length})</button>}
          <button onClick={clearAll} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,color:"#D4524A",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,textDecoration:"underline"}}>Clear entire list</button>
        </div>
      )}

      {/* Add Item Modal */}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:20}}>Add Grocery Item</h3>
            <div className="form-row"><label>Item name</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{width:"100%"}} placeholder="e.g. Free-range eggs" autoFocus/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:10}}>
              <div className="form-row"><label>Qty</label><input value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} style={{width:"100%"}} placeholder="2"/></div>
              <div className="form-row"><label>Unit</label><input value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))} style={{width:"100%"}} placeholder="kg, L, pkt…"/></div>
              <div className="form-row"><label>Aisle</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>
                  {GROCERY_CATS.map(c=><option key={c} value={c}>{AISLE_ICONS[c]||"📦"} {c}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row"><label>Notes (optional)</label><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{width:"100%"}} placeholder="e.g. low-fat, from deli counter"/></div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveItem}>Add to List</button>
            </div>
          </div>
        </div>
      )}

      {/* Recipe Picker Modal */}
      {showRecipePicker&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowRecipePicker(false)}>
          <div className="modal" style={{maxWidth:560}}>
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:6}}>Add from Recipes</h3>
            <p style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",marginBottom:20}}>Choose a recipe to pull its ingredients onto your list, or import everything from this week's meal plan.</p>

            {/* Import from week */}
            <div style={{background:"#F0F7EC",border:"1px solid #C8E6B8",borderRadius:10,padding:"14px 16px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
              <div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:14,color:"#4A7A3A"}}>📅 This week's meal plan</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#6A9A5A",marginTop:2}}>Adds ingredients for all recipes planned this week</div>
              </div>
              <button className="btn btn-primary" onClick={addFromWeekMeals} style={{background:"#5A8A4A",flexShrink:0}}>Import all</button>
            </div>

            {/* Individual recipes */}
            <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Or pick a recipe</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:320,overflowY:"auto"}}>
              {recipes.length===0&&<p style={{fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:14}}>No recipes saved yet.</p>}
              {recipes.map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#F9F6F2",borderRadius:10,cursor:"pointer"}}
                  onClick={()=>addFromRecipe(r)}>
                  <div style={{fontSize:24,flexShrink:0}}>{CAT_ICONS[r.category]||"🍴"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:14}}>{r.name}</div>
                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#8A7A6A",marginTop:1}}>
                      {r.ingredients?(r.ingredients.split(/,|\n/).filter(Boolean).length+" ingredients"):"No ingredients listed"}
                    </div>
                  </div>
                  <span style={{fontSize:13,color:"#7B5C4A",fontWeight:700,fontFamily:"'Source Sans 3',sans-serif"}}>+ Add →</span>
                </div>
              ))}
            </div>
            <button className="btn btn-ghost" onClick={()=>setShowRecipePicker(false)} style={{marginTop:20}}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Projects ──────────────────────────────────────────────────────────────────
function Projects({projects,setProjects}){
  const[showModal,setShowModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[form,setForm]=useState({title:"",category:"home-improvement",status:"planning",priority:"medium",notes:"",steps:[]});
  const[newStep,setNewStep]=useState("");
  const statusColor={planning:"#7B9EBF","in-progress":"#C9874F","on-hold":"#9B7BB8",completed:"#88B04B"};
  const openNew=()=>{setEditing(null);setForm({title:"",category:"home-improvement",status:"planning",priority:"medium",notes:"",steps:[]});setShowModal(true)};
  const openEdit=p=>{setEditing(p.id);setForm({...p});setShowModal(true)};
  const save=()=>{if(!form.title.trim())return;if(editing)setProjects(ps=>ps.map(p=>p.id===editing?{...form,id:editing}:p));else setProjects(ps=>[...ps,{...form,id:Date.now()}]);setShowModal(false)};
  const del=id=>{setProjects(ps=>ps.filter(p=>p.id!==id));if(expanded===id)setExpanded(null)};
  const toggleStep=(pid,sid)=>setProjects(ps=>ps.map(p=>p.id===pid?{...p,steps:p.steps.map(s=>s.id===sid?{...s,done:!s.done}:s)}:p));
  const addStep=()=>{if(!newStep.trim())return;setForm(f=>({...f,steps:[...f.steps,{id:Date.now(),text:newStep,done:false}]}));setNewStep("")};
  const remStep=id=>setForm(f=>({...f,steps:f.steps.filter(s=>s.id!==id)}));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Projects</h2>
        <button className="btn btn-primary" onClick={openNew}>+ New Project</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {projects.map(p=>{const done=p.steps.filter(s=>s.done).length;const pct=p.steps.length?Math.round(done/p.steps.length*100):0;const isOpen=expanded===p.id;return(
          <div key={p.id} className="card" style={{overflow:"hidden"}}>
            <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",gap:14,alignItems:"flex-start"}} onClick={()=>setExpanded(isOpen?null:p.id)}>
              <div style={{fontSize:28,marginTop:2}}>{CAT_ICONS[p.category]||"🔨"}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'Lora',serif",fontSize:17,fontWeight:600}}>{p.title}</span>
                  <span className="badge" style={{background:statusColor[p.status]+"22",color:statusColor[p.status]}}>{p.status}</span>
                  <span style={{fontSize:11,color:p.priority==="high"?"#D4524A":p.priority==="low"?"#88B04B":"#C9874F",fontWeight:700,fontFamily:"'Source Sans 3',sans-serif"}}>{p.priority} priority</span>
                </div>
                {p.steps.length>0&&<>
                  <div style={{background:"#EDE8E2",borderRadius:6,height:6,margin:"8px 0 4px",width:"min(300px,100%)"}}><div style={{background:statusColor[p.status],width:`${pct}%`,height:6,borderRadius:6}}/></div>
                  <div style={{fontSize:12,fontFamily:"'Source Sans 3',sans-serif",color:"#8A7A6A"}}>{pct}% · {done}/{p.steps.length} steps</div>
                </>}
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button className="btn btn-ghost" onClick={e=>{e.stopPropagation();openEdit(p)}} style={{fontSize:12,padding:"4px 10px"}}>Edit</button>
                <button className="btn btn-danger" onClick={e=>{e.stopPropagation();del(p.id)}} style={{fontSize:12,padding:"4px 10px"}}>✕</button>
              </div>
            </div>
            {isOpen&&<div style={{borderTop:"1px solid #F0EAE4",padding:"14px 18px",background:"#FDFAF8"}}>
              {p.notes&&<p style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",fontStyle:"italic",marginBottom:12}}>{p.notes}</p>}
              {p.steps.length>0&&<div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:"#B8A898",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Steps</div>
                {p.steps.map(s=>(
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,opacity:s.done?.5:1}}>
                    <input type="checkbox" checked={s.done} onChange={()=>toggleStep(p.id,s.id)} style={{width:16,height:16,cursor:"pointer",accentColor:"#7B5C4A"}}/>
                    <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,textDecoration:s.done?"line-through":"none"}}>{s.text}</span>
                  </div>
                ))}
              </div>}
            </div>}
          </div>
        )})}
        {projects.length===0&&<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:15}}>No projects yet.</div>}
      </div>
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:20}}>{editing?"Edit":"New"} Project</h3>
            <div className="form-row"><label>Project title</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={{width:"100%"}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="form-row"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{PROJ_CATS.map(c=><option key={c} value={c}>{CAT_ICONS[c]||"🔨"} {c}</option>)}</select></div>
              <div className="form-row"><label>Status</label><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={{width:"100%"}}>{PROJ_STATUS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            </div>
            <div className="form-row"><label>Priority</label><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={{width:"100%"}}><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
            <div className="form-row"><label>Notes</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{width:"100%",minHeight:60}}/></div>
            <div className="form-row">
              <label>Steps</label>
              {form.steps.map((s,i)=>(
                <div key={s.id} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                  <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898",width:20,flexShrink:0}}>{i+1}.</span>
                  <span style={{flex:1,fontFamily:"'Source Sans 3',sans-serif",fontSize:13}}>{s.text}</span>
                  <button className="btn btn-danger" onClick={()=>remStep(s.id)} style={{fontSize:11,padding:"2px 8px"}}>✕</button>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <input value={newStep} onChange={e=>setNewStep(e.target.value)} placeholder="Add a step…" style={{flex:1}} onKeyDown={e=>{if(e.key==="Enter")addStep()}}/>
                <button className="btn btn-ghost" onClick={addStep} style={{flexShrink:0}}>+ Add</button>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── Pantry ───────────────────────────────────────────────────────────────────
function Pantry({pantry,setPantry,setTab,setGrocery,grocery}){
  const[showModal,setShowModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("all");
  const[showLowOnly,setShowLowOnly]=useState(false);
  const[form,setForm]=useState({name:"",category:"Dry Goods",quantity:"",unit:"",lowStock:false,notes:""});
  const openNew=()=>{setEditing(null);setForm({name:"",category:"Dry Goods",quantity:"",unit:"",lowStock:false,notes:""});setShowModal(true)};
  const openEdit=p=>{setEditing(p.id);setForm({...p});setShowModal(true)};
  const save=()=>{
    if(!form.name.trim())return;
    const item={...form,quantity:form.quantity!==""?+form.quantity:null};
    if(editing)setPantry(ps=>ps.map(p=>p.id===editing?{...item,id:editing}:p));
    else setPantry(ps=>[...ps,{...item,id:Date.now()}]);
    setShowModal(false);
  };
  const del=id=>setPantry(ps=>ps.filter(p=>p.id!==id));
  const toggleLow=id=>setPantry(ps=>ps.map(p=>p.id===id?{...p,lowStock:!p.lowStock}:p));
  const addLowToGrocery=()=>{
    const low=pantry.filter(p=>p.lowStock);
    if(!low.length){alert("No items marked as low stock.");return}
    setGrocery(g=>[...g,...low.map(p=>({id:Date.now()+Math.random(),name:p.name,qty:"",unit:p.unit||"",category:"Pantry",notes:"From pantry - low stock",done:false}))]);
    setTab("grocery");
  };
  const filtered=pantry.filter(p=>(filterCat==="all"||p.category===filterCat)&&(!showLowOnly||p.lowStock)&&p.name.toLowerCase().includes(search.toLowerCase()));
  const cats=filterCat==="all"?[...new Set(filtered.map(p=>p.category))]:[filterCat];
  const lowCount=pantry.filter(p=>p.lowStock).length;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontFamily:"'Lora',serif",fontSize:22}}>Pantry</h2>
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A",marginTop:2}}>
            {pantry.length} items&nbsp;·&nbsp;{lowCount>0?<span style={{color:"#D4524A",fontWeight:700}}>&#9888; {lowCount} low stock</span>:<span style={{color:"#88B04B"}}>&#10003; All stocked</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {lowCount>0&&<button className="btn btn-ghost" onClick={addLowToGrocery} style={{fontSize:13,color:"#D4524A",borderColor:"#D4524A"}}>&#128722; Add low stock to grocery</button>}
          <button className="btn btn-primary" onClick={openNew}>+ Add Item</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search pantry..." style={{flex:1,minWidth:150}}/>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:150}}>
          <option value="all">All categories</option>
          {PANTRY_CATS.map(c=><option key={c} value={c}>{PANTRY_CAT_ICONS[c]} {c}</option>)}
        </select>
        <button onClick={()=>setShowLowOnly(!showLowOnly)} style={{border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Source Sans 3',sans-serif",background:showLowOnly?"#D4524A":"#EDE8E2",color:showLowOnly?"white":"#7A6A5A",transition:"all 0.18s"}}>Low stock only</button>
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'Source Sans 3',sans-serif",color:"#B8A898",fontSize:15}}><div style={{fontSize:48,marginBottom:12}}>&#128298;</div>{pantry.length===0?"Your pantry is empty. Click + Add Item to start.":"Nothing matches your filter."}</div>}
      {cats.map(cat=>{
        const items=filtered.filter(p=>p.category===cat);
        if(!items.length)return null;
        return(
          <div key={cat} style={{marginBottom:20}}>
            <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:700,color:"#B8A898",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>{PANTRY_CAT_ICONS[cat]||"&#128230;"}</span>{cat}
              <span style={{background:"#EDE8E2",color:"#8A7A6A",borderRadius:10,padding:"1px 8px",fontSize:11}}>{items.length}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {items.map(p=>(
                <div key={p.id} className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,borderLeft:"3px solid "+(p.lowStock?"#D4524A":"#E8E0D8")}}>
                  <button onClick={()=>toggleLow(p.id)} title={p.lowStock?"Mark as stocked":"Mark as low stock"} style={{border:"none",background:"none",cursor:"pointer",fontSize:20,flexShrink:0,opacity:p.lowStock?1:0.2,transition:"opacity 0.2s"}}>&#9888;</button>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:15,color:p.lowStock?"#D4524A":"#3A2E28"}}>{p.name}</div>
                    <div style={{fontSize:12,fontFamily:"'Source Sans 3',sans-serif",color:"#8A7A6A",marginTop:2,display:"flex",gap:10,flexWrap:"wrap"}}>
                      {p.quantity!==null&&p.quantity!==""&&<span>Qty: <strong>{p.quantity}{p.unit?" "+p.unit:""}</strong></span>}
                      {p.lowStock&&<span style={{color:"#D4524A",fontWeight:700}}>Low stock</span>}
                      {p.notes&&<span style={{fontStyle:"italic"}}>{p.notes}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button className="btn btn-ghost" onClick={()=>openEdit(p)} style={{fontSize:12,padding:"4px 10px"}}>Edit</button>
                    <button className="btn btn-danger" onClick={()=>del(p.id)} style={{fontSize:12,padding:"4px 10px"}}>X</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {pantry.length>0&&<div style={{background:"#FFF8E8",border:"1px solid #F4C97A",borderRadius:10,padding:"12px 16px",marginTop:8,fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#7B5C4A"}}>Tip: Tap the warning icon on any item to mark it low stock, then use "Add low stock to grocery" to send them all to your shopping list.</div>}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:20}}>{editing?"Edit":"Add"} Pantry Item</h3>
            <div className="form-row"><label>Item name</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{width:"100%"}} placeholder="e.g. Basmati rice" autoFocus/></div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:10}}>
              <div className="form-row"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:"100%"}}>{PANTRY_CATS.map(c=><option key={c} value={c}>{PANTRY_CAT_ICONS[c]} {c}</option>)}</select></div>
              <div className="form-row"><label>Quantity</label><input type="number" min="0" value={form.quantity} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))} style={{width:"100%"}} placeholder="2"/></div>
              <div className="form-row"><label>Unit</label><input value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))} style={{width:"100%"}} placeholder="kg, tins..."/></div>
            </div>
            <div className="form-row"><label>Notes (optional)</label><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{width:"100%"}} placeholder="e.g. brand, shelf"/></div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <input type="checkbox" id="lowStockCb" checked={form.lowStock} onChange={e=>setForm(f=>({...f,lowStock:e.target.checked}))} style={{width:18,height:18,accentColor:"#D4524A",cursor:"pointer"}}/>
              <label htmlFor="lowStockCb" style={{textTransform:"none",letterSpacing:0,fontSize:14,color:"#D4524A",cursor:"pointer",marginBottom:0}}>Mark as low stock</label>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function UserAvatar({user}){
  const[open,setOpen]=useState(false);
  const initial=(user.displayName||user.email||"?")[0].toUpperCase();
  return(
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(!open)} style={{width:30,height:30,borderRadius:"50%",border:"2px solid #F4C97A",background:"#7B5C4A",color:"white",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:0}}>
        {user.photoURL?<img src={user.photoURL} style={{width:30,height:30,borderRadius:"50%"}} alt=""/>:initial}
      </button>
      {open&&(
        <div style={{position:"absolute",right:0,top:36,background:"white",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",padding:8,minWidth:190,zIndex:999}}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #F0EAE4",marginBottom:4}}>
            <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13}}>{user.displayName||"My Account"}</div>
            <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#B8A898"}}>{user.email}</div>
          </div>
          <button onClick={()=>{window._fbSignOut();setOpen(false);}} style={{width:"100%",padding:"8px 12px",border:"none",background:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#D4524A",fontWeight:600,textAlign:"left",borderRadius:6}}>Sign out</button>
        </div>
      )}
    </div>
  );
}

function NudgeModal({onSignUp,onDismiss}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(58,46,40,0.6)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"white",borderRadius:20,padding:32,maxWidth:400,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:10}}>🌿</div>
        <h3 style={{fontFamily:"'Lora',serif",fontSize:20,marginBottom:10}}>Enjoying the planner?</h3>
        <p style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,color:"#8A7A6A",marginBottom:24}}>Sign up free to save your data to the cloud and access from any device. Your data carries over automatically.</p>
        <button onClick={onSignUp} style={{width:"100%",padding:"12px",border:"none",borderRadius:10,background:"#7B5C4A",color:"white",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>Create free account</button>
        <button onClick={onDismiss} style={{border:"none",background:"none",color:"#B8A898",fontFamily:"'Source Sans 3',sans-serif",fontSize:13,cursor:"pointer",textDecoration:"underline"}}>Maybe later</button>
      </div>
    </div>
  );
}

function AuthModal({onClose,startMode}){
  const[mode,setMode]=useState(startMode||"signup");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[name,setName]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);

  const google=async()=>{
    setErr("");setBusy(true);
    try{await window._fbSignInGoogle();onClose();}
    catch(e){setErr("Google error: "+e.code+" — "+e.message);}
    setBusy(false);
  };

  const submit=async()=>{
    setErr("");
    if(!email.trim()||!pw.trim()){setErr("Please enter email and password.");return;}
    if(mode==="signup"&&!name.trim()){setErr("Please enter your name.");return;}
    if(pw.length<6){setErr("Password must be at least 6 characters.");return;}
    setBusy(true);
    try{
      if(mode==="signup") await window._fbSignUpEmail(email.trim(),pw,name.trim());
      else await window._fbSignInEmail(email.trim(),pw);
      onClose();
    }catch(e){
      const m={"auth/email-already-in-use":"That email is already registered.","auth/user-not-found":"No account with that email.","auth/wrong-password":"Incorrect password.","auth/invalid-email":"Invalid email address.","auth/invalid-credential":"Incorrect email or password.","auth/operation-not-allowed":"Email sign-in is not enabled. Please use Google sign-in.","auth/weak-password":"Password is too weak — use at least 6 characters.","auth/network-request-failed":"Network error — please check your connection.","auth/too-many-requests":"Too many attempts. Please wait a moment and try again."};
      setErr(m[e.code]||("Error: "+e.code+" — "+e.message));
    }
    setBusy(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(58,46,40,0.6)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"white",borderRadius:20,padding:28,maxWidth:400,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{fontFamily:"'Lora',serif",fontSize:20}}>{mode==="signup"?"Create free account":"Welcome back"}</h3>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:"#B8A898",lineHeight:1}}>x</button>
        </div>
        <button onClick={google} disabled={busy} style={{width:"100%",padding:"10px",border:"1.5px solid #D4C9BC",borderRadius:8,background:"white",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:14,marginBottom:14}}>
          Continue with Google
        </button>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <div style={{flex:1,height:1,background:"#E8E0D8"}}/>
          <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#B8A898"}}>or</span>
          <div style={{flex:1,height:1,background:"#E8E0D8"}}/>
        </div>
        {mode==="signup"&&<div className="form-row"><label>Your name</label><input value={name} onChange={e=>setName(e.target.value)} style={{width:"100%"}} placeholder="e.g. Johan"/></div>}
        <div className="form-row"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} style={{width:"100%"}} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        <div className="form-row"><label>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={{width:"100%"}} placeholder={mode==="signup"?"At least 6 characters":""} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        {err&&<div style={{background:"#FFF0F0",border:"1px solid #FFCCC7",borderRadius:8,padding:"9px 12px",fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#D4524A",marginBottom:12}}>{err}</div>}
        <button onClick={submit} disabled={busy} style={{width:"100%",padding:"11px",border:"none",borderRadius:10,background:"#7B5C4A",color:"white",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:12}}>
          {busy?"Please wait...":(mode==="signup"?"Create Account":"Sign In")}
        </button>
        <div style={{textAlign:"center",fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#8A7A6A"}}>
          {mode==="signin"
            ?<span>No account? <button onClick={()=>{setMode("signup");setErr("");}} style={{border:"none",background:"none",color:"#7B5C4A",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:"inherit"}}>Sign up free</button></span>
            :<span>Have an account? <button onClick={()=>{setMode("signin");setErr("");}} style={{border:"none",background:"none",color:"#7B5C4A",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:"inherit"}}>Sign in</button></span>}
        </div>
        <div style={{marginTop:14,padding:"9px 12px",background:"#F9F6F2",borderRadius:8,fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#B8A898",textAlign:"center"}}>Your data is private and only visible to you. Free forever.</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
